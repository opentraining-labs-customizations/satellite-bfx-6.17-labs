---
- name: Grading playbook for SCENARIO_PGSQL
  hosts: satellite
  become: True
  gather_facts: yes
  tasks:
    - name: Detecting health
      ansible.builtin.command: bash -c "hammer --output=json ping  | jq -r '.[].candlepin.Status'"
      register: health
    
    - name: Checking result
      debug:
        msg: "Success. your alphanumeric code for completion is PGSQL26"
      when: ssl_error.rc == 0 and hammer_result.rc == 0

    - name: In case of failure
      debug:
        msg: "Please try again"
      when: ssl_error.rc != 0 or hammer_result.rc != 0

